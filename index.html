<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Music Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
transition:0.5s;
}

body.light{
background:linear-gradient(135deg,#ffd6ec,#d6f0ff);
}

.player{
width:300px;
padding:20px;
border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
color:white;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

body.light .player{
color:black;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.top button{
border:none;
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
font-size:18px;
background:#ffffff25;
color:white;
}

body.light .top button{
color:black;
}

.cover{
width:180px;
height:180px;
margin:auto;
border-radius:20px;
overflow:hidden;
margin-bottom:15px;
}

.cover img{
width:100%;
height:100%;
object-fit:cover;
}

h2{
font-size:22px;
}

p{
opacity:0.8;
margin-bottom:15px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:15px 0;
}

.controls button{
border:none;
cursor:pointer;
}

.play{
width:60px;
height:60px;
border-radius:50%;
font-size:24px;
background:#ff4da6;
color:white;
}

.small{
width:45px;
height:45px;
border-radius:50%;
background:#ffffff25;
color:white;
font-size:20px;
}

.progress-container{
width:100%;
height:6px;
background:#ffffff30;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.progress{
height:100%;
width:0%;
background:#ff4da6;
border-radius:10px;
}

.volume{
margin-top:15px;
}

input[type="range"]{
width:100%;
accent-color:#ff4da6;
}

</style>
</head>

<body>

<div class="player">

<div class="top">
<button onclick="toggleTheme()">🌙</button>
<button onclick="togglePower()">⏻</button>
</div>

<div class="cover">
<img id="cover" src="images/dracula.jpg">
</div>

<h2 id="title">Dracula</h2>
<p id="artist">Artist</p>

<div class="controls">
<button class="small" onclick="prevSong()">⏮</button>
<button class="play" id="play">▶</button>
<button class="small" onclick="nextSong()">⏭</button>
</div>

<div class="progress-container" id="progress-container">
<div class="progress" id="progress"></div>
</div>

<div class="volume">
<input type="range" id="volume" min="0" max="1" step="0.1">
</div>

</div>

<audio id="audio"></audio>

<script>

const songs = [

{
title:"Dracula",
artist:"Artist",
src:"songs/dracula.mp3",
cover:"images/dracula.jpg"
},

{
title:"Espresso",
artist:"Sabrina Carpenter",
src:"songs/espresso.mp3",
cover:"images/espresso.jpg"
},

{
title:"Cheri Cheri Lady",
artist:"Modern Talking",
src:"songs/cheri.mp3",
cover:"images/cheri.jpg"
}

];

let currentSong = 0;
let playing = false;
let power = true;

const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progress-container");
const volume = document.getElementById("volume");

function loadSong(song){
title.innerText = songs[song].title;
artist.innerText = songs[song].artist;
audio.src = songs[song].src;
cover.src = songs[song].cover;
}

loadSong(currentSong);

function playSong(){

if(!power) return;

playing = true;
audio.play();
playBtn.innerHTML = "⏸";

}

function pauseSong(){

playing = false;
audio.pause();
playBtn.innerHTML = "▶";

}

playBtn.addEventListener("click", ()=>{

if(playing){
pauseSong();
}else{
playSong();
}

});

function nextSong(){

currentSong++;

if(currentSong > songs.length-1){
currentSong = 0;
}

loadSong(currentSong);
playSong();

}

function prevSong(){

currentSong--;

if(currentSong < 0){
currentSong = songs.length-1;
}

loadSong(currentSong);
playSong();

}

audio.addEventListener("timeupdate", e=>{

const {duration,currentTime} = e.srcElement;

const percent = (currentTime/duration)*100;

progress.style.width = percent + "%";

});

progressContainer.addEventListener("click", function(e){

const width = this.clientWidth;
const clickX = e.offsetX;
const duration = audio.duration;

audio.currentTime = (clickX/width)*duration;

});

audio.addEventListener("ended", nextSong);

volume.addEventListener("input", ()=>{

audio.volume = volume.value;

});

volume.value = 1;

function toggleTheme(){

document.body.classList.toggle("light");

}

function togglePower(){

power = !power;

if(!power){
pauseSong();
alert("Player OFF");
}else{
alert("Player ON");
}

}

</script>

</body>
</html>
